# Supabase local-dev config (used by the Supabase CLI).
# Install: `brew install supabase/tap/supabase`
# Run migrations against your remote project with:
#   supabase link --project-ref YOUR-REF
#   supabase db push

project_id = "bullfin-ai"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false # set true for production

[storage]
enabled = true
file_size_limit = "10MiB"

[studio]
enabled = true
port = 54323
