server {
  listen       80;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # Static asset caching — hashed filenames get a year of caching.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
  }

  # HTML must not be cached so deploys roll out immediately.
  location = /index.html {
    add_header Cache-Control "no-store, must-revalidate";
  }

  # SPA history fallback.
  location / {
    try_files $uri /index.html;
  }

  # Baseline security headers. CSP is kept permissive enough for Supabase
  # (auth endpoints, realtime websockets), Gemini streaming and inline styles
  # coming out of CSS-in-JS libraries.
  add_header X-Frame-Options            "DENY" always;
  add_header X-Content-Type-Options     "nosniff" always;
  add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
}
