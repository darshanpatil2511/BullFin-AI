name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------
  # Apply Supabase migrations to the linked project.
  # ------------------------------------------------------------
  migrate:
    name: Push Supabase migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Push migrations
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  # ------------------------------------------------------------
  # Trigger a Render deploy for the api and ml services.
  # (Alternative: use Render's "auto-deploy on push" and remove this job.)
  # ------------------------------------------------------------
  render:
    name: Deploy ${{ matrix.service }} to Render
    runs-on: ubuntu-latest
    needs: migrate
    strategy:
      matrix:
        service: [api, ml]
    steps:
      - name: Trigger deploy
        if: ${{ (matrix.service == 'api' && secrets.RENDER_API_DEPLOY_HOOK != '') || (matrix.service == 'ml' && secrets.RENDER_ML_DEPLOY_HOOK != '') }}
        run: |
          HOOK="${{ matrix.service == 'api' && secrets.RENDER_API_DEPLOY_HOOK || secrets.RENDER_ML_DEPLOY_HOOK }}"
          echo "Hitting Render deploy hook for ${{ matrix.service }}"
          curl -fsS -X POST "$HOOK"

  # ------------------------------------------------------------
  # Vercel handles its own Git-based deploys; this job pings the
  # deploy hook so a push triggers a rebuild explicitly if the
  # repo isn't linked to Vercel for Git integration.
  # ------------------------------------------------------------
  vercel:
    name: Deploy web to Vercel
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Trigger Vercel
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
