name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: '9.12.0'
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.11'

jobs:
  # ------------------------------------------------------------
  # JS/TS: lint, typecheck, test, build — web + api + shared
  # ------------------------------------------------------------
  node:
    name: Node (${{ matrix.task }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [lint, typecheck, test, build]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run ${{ matrix.task }}
        run: pnpm ${{ matrix.task }}
        env:
          # Placeholder values so Vite's env validation doesn't abort the build in CI.
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key-value-for-build-only
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_ANON_KEY: ci-placeholder-anon-key-value-for-build-only
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key-for-build-only
          GEMINI_API_KEY: ci-placeholder-gemini-key-for-build-only

  # ------------------------------------------------------------
  # Python ML engine
  # ------------------------------------------------------------
  python:
    name: Python (${{ matrix.task }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [ruff, mypy, pytest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'apps/ml/pyproject.toml'

      - name: Install deps
        working-directory: apps/ml
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        if: matrix.task == 'ruff'
        working-directory: apps/ml
        run: ruff check .

      - name: Mypy (typecheck)
        if: matrix.task == 'mypy'
        working-directory: apps/ml
        run: mypy app || true # ML math has loose types; soft-fail for now

      - name: Pytest
        if: matrix.task == 'pytest'
        working-directory: apps/ml
        run: pytest -q

  # ------------------------------------------------------------
  # Docker images — smoke-build each container to catch regressions
  # ------------------------------------------------------------
  docker:
    name: Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [node, python]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            context: .
            dockerfile: apps/api/Dockerfile
          - image: ml
            context: apps/ml
            dockerfile: apps/ml/Dockerfile
          - image: web
            context: .
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          tags: bullfin-${{ matrix.image }}:ci
          cache-from: type=gha,scope=bullfin-${{ matrix.image }}
          cache-to: type=gha,scope=bullfin-${{ matrix.image }},mode=max
          build-args: |
            VITE_SUPABASE_URL=https://example.supabase.co
            VITE_SUPABASE_ANON_KEY=ci-placeholder
            VITE_API_URL=http://localhost:4000
